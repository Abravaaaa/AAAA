<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agibank - Agendamento de Salário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Cores extraídas e inspiradas no logo Agibank */
            --agi-blue: #00bcd4;
            --agi-dark-blue: #002d4b;
            --agi-light-bg: #f0f7f9;
        }
        
        body {
            background-color: var(--agi-light-bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .agi-card {
            border-top: 6px solid var(--agi-blue);
        }

        .btn-primary {
            background-color: var(--agi-blue);
            transition: all 0.2s ease-in-out;
        }

        .btn-primary:active {
            transform: scale(0.98);
            filter: brightness(0.9);
        }

        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto;
        }

        .check-circle {
            background: rgba(0, 188, 212, 0.1);
            color: var(--agi-blue);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden agi-card">
        <!-- Header com Logo -->
        <div class="pt-10 pb-6 text-center">
            <div class="logo-container mb-4">
                <img 
                    src="https://play-lh.googleusercontent.com/A51HxOlU7KzYgxOzkJIXaDEyJYDSeUbs6fmEOajPR9PuEETw0LVko1snEauJAbuxDA" 
                    alt="Logo Agibank" 
                    class="w-full h-full object-contain rounded-2xl shadow-sm"
                    onerror="this.src='https://via.placeholder.com/80?text=Agi'"
                >
            </div>
        </div>

        <!-- Conteúdo Principal -->
        <div class="px-8 pb-10 text-center">
            <!-- Ícone de Sucesso -->
            <div class="w-16 h-16 check-circle rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-calendar-check text-2xl"></i>
            </div>

            <h1 class="text-xl font-bold text-slate-800 mb-3">Tudo certo!</h1>
            
            <div class="space-y-2 mb-8">
                <p class="text-slate-600">
                    O recebimento do seu salário foi agendado com sucesso.
                </p>
                <div class="inline-block bg-slate-50 px-4 py-2 rounded-full border border-slate-100">
                    <span class="text-slate-500 text-sm">Data prevista:</span>
                    <span class="font-bold text-slate-800 ml-1">28/04</span>
                </div>
            </div>

            <!-- Card de Instrução -->
            <div class="bg-blue-50/50 rounded-2xl p-5 mb-8 text-left flex items-start gap-3">
                <div class="mt-1 text-cyan-600">
                    <i class="fas fa-receipt"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-cyan-900 leading-tight">
                        Fique de olho no seu extrato para conferir o lançamento.
                    </p>
                </div>
            </div>

            <!-- Ações -->
            <div class="space-y-4">
                <button onclick="showToast()" class="w-full btn-primary text-white font-bold py-4 rounded-2xl shadow-lg shadow-cyan-200">
                    Verificar meu extrato
                </button>
                
                <button class="w-full text-slate-400 font-medium py-2 text-sm hover:text-slate-600 transition-colors">
                    Voltar para o início
                </button>
            </div>
        </div>

        <!-- Rodapé Estilizado -->
        <div class="bg-slate-50 py-4 px-8 border-t border-slate-100 flex justify-between items-center">
            <span class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Protocolo: 8293041</span>
            <i class="fas fa-shield-alt text-slate-300 text-sm"></i>
        </div>
    </div>

    <!-- Feedback Visual -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-medium opacity-0 transition-opacity pointer-events-none">
        Abrindo extrato...
    </div>

    <script>
        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2500);
        }
    </script>
</body>
</html>
